# Argus production stack — redis + styx + pantheon.
# Run from the repo root:
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# styx REST+SignalR:  http://localhost:8080
# styx gRPC ingest:  localhost:8081  (herald agents)
# pantheon UI:       http://localhost:4200
services:
  redis:
    image: redis:7-alpine
    # Persist a snapshot every 60 seconds if at least 1 key changed.
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - argus-redis:/data
    restart: unless-stopped

  styx:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: src/Argus.Styx/Dockerfile
    depends_on:
      - redis
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Argus: "Data Source=/data/argus.db"
      Redis__ConnectionString: "redis:6379"
      Retention__Days: "7"
      Database__MigrateOnStartup: "true"
    volumes:
      - argus-sqlite:/data
    ports:
      - "8080:8080"
      - "8081:8081"
    restart: unless-stopped

  pantheon:
    build:
      context: ../src/pantheon
      dockerfile: Dockerfile
    depends_on:
      - styx
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  argus-redis:
  argus-sqlite:

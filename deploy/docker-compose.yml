# Local dev stack for Argus. Run from the repo root:
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# styx publishes 8080 (REST + SignalR) and 8081 (gRPC ingest for herald).
# pantheon is served on http://localhost:4200 and talks to styx on localhost:8080.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - argus-mssql:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  styx:
    build:
      context: ..
      dockerfile: src/Argus.Styx/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__Argus: "Server=sqlserver,1433;Database=Argus;User Id=sa;Password=Your_password123;TrustServerCertificate=True"
      Retention__Days: "7"
      Ingest__ApiKeys__0: "dev-agent-key-001"
      Cors__Origins__0: "http://localhost:4200"
    ports:
      - "8080:8080"
      - "8081:8081"

  pantheon:
    build:
      context: ../src/pantheon
      dockerfile: Dockerfile
    depends_on:
      - styx
    ports:
      - "4200:80"

volumes:
  argus-mssql:

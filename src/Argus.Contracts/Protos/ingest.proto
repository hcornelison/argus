syntax = "proto3";

option csharp_namespace = "Argus.Contracts";

package argus.ingest.v1;

import "google/protobuf/timestamp.proto";

// IngestService is the herald (agent) -> styx (server) contract.
// Every call carries the agent API key in the "x-argus-api-key" metadata header,
// validated by a server-side interceptor.
service IngestService {
  // Announce this host on agent startup. Returns the server-assigned host id,
  // which the agent caches and includes in subsequent samples.
  rpc RegisterHost(RegisterHostRequest) returns (RegisterHostResponse);

  // Continuous client-streaming uploads. Server acks the whole stream when the
  // agent half-closes (or periodically, depending on implementation).
  rpc StreamMetrics(stream MetricBatch) returns (IngestAck);
  rpc StreamProcesses(stream ProcessBatch) returns (IngestAck);
  rpc StreamEvents(stream EventBatch) returns (IngestAck);
  rpc StreamLogs(stream LogBatch) returns (IngestAck);
}

message RegisterHostRequest {
  string machine_name = 1;
  string operating_system = 2; // e.g. "Windows Server 2025", "Ubuntu 24.04"
  string agent_version = 3;
}

message RegisterHostResponse {
  int64 host_id = 1;
}

message IngestAck {
  int64 accepted = 1; // number of records accepted
}

// ---- Metrics (overall resource usage) ----

message MetricBatch {
  int64 host_id = 1;
  repeated MetricSample samples = 2;
}

message MetricSample {
  google.protobuf.Timestamp timestamp = 1;
  double cpu_percent = 2;
  int64 memory_total_bytes = 3;
  int64 memory_used_bytes = 4;
  repeated DiskSample disks = 5;
}

message DiskSample {
  string mount = 1;          // "C:\" or "/"
  int64 total_bytes = 2;
  int64 used_bytes = 3;
}

// ---- Per-process information ----

message ProcessBatch {
  int64 host_id = 1;
  // A single point-in-time snapshot of all (or top-N) processes.
  google.protobuf.Timestamp timestamp = 2;
  repeated ProcessSample processes = 3;
}

message ProcessSample {
  int32 pid = 1;
  string name = 2;
  double cpu_percent = 3;
  int64 memory_bytes = 4;
  int32 thread_count = 5;
}

// ---- OS event logs (Windows Event Viewer / Linux journald) ----

message EventBatch {
  int64 host_id = 1;
  repeated EventEntry entries = 2;
}

message EventEntry {
  google.protobuf.Timestamp timestamp = 1;
  string channel = 2;  // Windows channel/log name or systemd unit
  string source = 3;   // provider name
  string level = 4;    // Information / Warning / Error / Critical
  int32 event_id = 5;
  string message = 6;
}

// ---- Tailed log files ----

message LogBatch {
  int64 host_id = 1;
  repeated LogLine lines = 2;
}

message LogLine {
  google.protobuf.Timestamp timestamp = 1;
  string file_path = 2;
  string line = 3;
  string level = 4; // best-effort parsed level, may be empty
}

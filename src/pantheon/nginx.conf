# nginx for the pantheon container: serve the SPA and reverse-proxy API + SignalR to styx,
# so the production build's relative URLs (/api, /hubs/live) resolve same-origin.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # REST API -> styx (compose service name).
    location /api/ {
        proxy_pass http://styx:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub -> styx, with WebSocket upgrade.
    location /hubs/ {
        proxy_pass http://styx:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 1h;
    }

    # SPA fallback for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

<header class="topbar">
  <div class="brand">
    <span class="logo">◎</span> Argus
  </div>
  <nav>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Fleet</a>
    <a routerLink="/logs" routerLinkActive="active">Logs</a>
    <a routerLink="/events" routerLinkActive="active">Events</a>
  </nav>
  <p-button class="theme-toggle" [text]="true" [rounded]="true"
            [icon]="theme.isDark() ? 'pi pi-sun' : 'pi pi-moon'"
            (onClick)="theme.toggle()"
            [ariaLabel]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"></p-button>
</header>

<main>
  <router-outlet></router-outlet>
</main>

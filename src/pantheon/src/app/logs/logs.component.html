<div class="page">
  <div class="page-head">
    <h2>Logs</h2>
    <span class="muted">Filter by host, file, and time window (default: last 5 minutes)</span>
  </div>

  <div class="filters">
    <p-select [options]="hosts()" optionLabel="machineName" optionValue="id" [(ngModel)]="hostId"
              (onChange)="onHostChange()" placeholder="All hosts" [showClear]="true" styleClass="f"></p-select>

    <p-select [options]="files()" [(ngModel)]="filePath" (onChange)="search_()"
              placeholder="All files" [showClear]="true" [filter]="true" styleClass="f-wide"></p-select>

    <p-select [options]="windowOptions" optionLabel="label" optionValue="value" [(ngModel)]="minutes"
              (onChange)="search_()" styleClass="f"></p-select>

    <input pInputText type="text" [(ngModel)]="search" (keyup.enter)="search_()" placeholder="Search text…" />

    <p-button label="Search" icon="pi pi-search" (onClick)="search_()"></p-button>

    <div class="tail">
      <p-toggleswitch [(ngModel)]="liveTail" (onChange)="toggleLiveTail()"></p-toggleswitch>
      <span>Live tail</span>
    </div>
  </div>

  <ag-grid-angular
    class="ag-theme-quartz-dark"
    style="width: 100%; height: 65vh;"
    [rowData]="lines()"
    [columnDefs]="logCols"
    [defaultColDef]="defaultColDef"
    [pagination]="!liveTail"
    [paginationPageSize]="100"
    [paginationPageSizeSelector]="[50, 100, 250, 500]"
    [rowBuffer]="20"
  />
</div>

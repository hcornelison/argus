<div class="page">
  <div class="page-head">
    <h2>Events</h2>
    <span class="muted">OS event logs (Windows Event Viewer / Linux journald / macOS unified log)</span>
  </div>

  <div class="filters">
    <p-select [options]="hosts()" optionLabel="machineName" optionValue="id" [(ngModel)]="hostId"
              (onChange)="search_()" placeholder="All hosts" [showClear]="true" styleClass="f"></p-select>

    <p-select [options]="levelOptions" optionLabel="label" optionValue="value" [(ngModel)]="level"
              (onChange)="search_()" placeholder="All levels" [showClear]="true" styleClass="f"></p-select>

    <p-select [options]="windowOptions" optionLabel="label" optionValue="value" [(ngModel)]="minutes"
              (onChange)="search_()" styleClass="f"></p-select>

    <input pInputText type="text" [(ngModel)]="search" (keyup.enter)="search_()" placeholder="Search message…" />

    <p-button label="Search" icon="pi pi-search" (onClick)="search_()"></p-button>

    <div class="tail">
      <p-toggleswitch [(ngModel)]="liveTail" (onChange)="toggleLiveTail()"></p-toggleswitch>
      <span>Live tail</span>
    </div>
  </div>

  <ag-grid-angular
    [class]="theme.isDark() ? 'ag-theme-quartz-dark' : 'ag-theme-quartz'"
    style="width: 100%; height: 65vh;"
    [rowData]="entries()"
    [columnDefs]="eventCols"
    [defaultColDef]="defaultColDef"
    [pagination]="!liveTail"
    [paginationPageSize]="100"
    [paginationPageSizeSelector]="[50, 100, 250, 500]"
    [rowBuffer]="20"
  />
</div>
